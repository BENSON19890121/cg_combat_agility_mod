<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>魔力寶貝戰鬥敏捷修正</title>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #1a202c; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 2px;
            overflow: hidden; 
        }

        /* 整體放大 1.15 倍的寬度配比 */
        .container { width: 796px; height: 596px; margin: 0 auto; display: flex; flex-direction: column; }
        
        /* 標題高度與字體微調 */
        h2 { text-align: center; color: #f6e05e; margin: 2px 0; font-size: 1.45em; letter-spacing: 1px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            padding: 2px;
        }

        .char-card { 
            background: #2d3748; 
            border-radius: 6px; 
            padding: 6px; 
            border: 2px solid #4a5568;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* 圖標微調 */
        .char-header {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1em; 
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .base-section { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
        }
        /* 字體縮小 0.05 係數 */
        .label-main { font-size: 1.05em; color: #f6e05e; font-weight: bold; }

        .stat-columns { display: flex; gap: 5px; }
        .zone { padding: 3px; border-radius: 4px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .hp-zone { background: rgba(229, 62, 62, 0.1); border: 1px solid #e53e3e; }
        .mp-zone { background: rgba(49, 130, 206, 0.1); border: 1px solid #3182ce; }

        /* 輸入框字體同步微調 */
        input { 
            width: 100%; 
            padding: 2px 0; 
            border: 1px solid #4a5568; 
            border-radius: 2px; 
            font-size: 23px; 
            text-align: center; 
            font-weight: 900;
            background: #000;
            color: #fff;
        }
        input:focus { outline: none; border-color: #f6e05e; }

        .sub-tag { font-size: 10.5px; text-align: center; color: #a0aec0; font-weight: bold; line-height: 1; }

        .tag-btn { 
            cursor: pointer; 
            transition: 0.1s; 
            border-radius: 2px; 
            font-size: 11.5px; 
            padding: 3px 0;
            color: #fff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .hp-btn { background: #c53030; }
        .mp-btn { background: #2b6cb0; }

        .bolt { color: #f6e05e; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .agi-input { width: 85px !important; color: #4ade80 !important; }
        
        .calc-btn { 
            width: 100%; padding: 6px; 
            background: #f6e05e; color: #000; 
            border: none; border-radius: 4px; 
            cursor: pointer; font-size: 1.15em; font-weight: 900;
        }

        .agi-display { padding: 4px; background: rgba(0,0,0,0.5); border-radius: 4px; text-align: center; }
        .agi-label { font-size: 0.85em; color: #cbd5e0; }
        .agi-value { font-size: 1.55em; font-weight: 900; color: #48bb78; }

        .flash-success { background-color: #48bb78 !important; border-color: #fff !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>魔力寶貝戰鬥敏捷修正</h2>
    
    <div class="grid" id="main-grid">
        <script>
            const chars = [
                { id: 0, icon: '🦇' }, { id: 1, icon: '🐝' }, { id: 2, icon: '🦎' },
                { id: 3, icon: '🐻' }, { id: 4, icon: '💀' }, { id: 5, icon: '🦅' }
            ];

            chars.forEach(char => {
                document.write(`
                <div class="char-card">
                    <div class="char-header">${char.icon}</div>
                    <div class="base-section">
                        <span class="label-main">敏捷</span>
                        <input type="number" id="baseAgi-${char.id}" class="agi-input" placeholder="0">
                    </div>
                    <div class="stat-columns">
                        <div class="zone hp-zone">
                            <input type="number" id="curHp-${char.id}" placeholder="0">
                            <div class="sub-tag">當前HP</div>
                            <div class="tag-btn hp-btn" onclick="quickFill('Hp', ${char.id})">
                                <span class="bolt">⚡</span>最大血量
                            </div>
                            <input type="number" id="maxHp-${char.id}" placeholder="0">
                        </div>
                        <div class="zone mp-zone">
                            <input type="number" id="curMp-${char.id}" placeholder="0">
                            <div class="sub-tag">當前MP</div>
                            <div class="tag-btn mp-btn" onclick="quickFill('Mp', ${char.id})">
                                <span class="bolt">⚡</span>最大魔量
                            </div>
                            <input type="number" id="maxMp-${char.id}" placeholder="0">
                        </div>
                    </div>
                    <button class="calc-btn" onclick="calc(${char.id})">計算</button>
                    <div class="agi-display">
                        <span class="agi-label">戰鬥敏捷修正</span>
                        <span class="agi-value" id="val-${char.id}">--</span>
                    </div>
                </div>
                `);
            });
        </script>
    </div>
</div>

<script>
    function quickFill(type, id) {
        const maxInput = document.getElementById(`max${type}-${id}`);
        if (maxInput.value === '') return;
        const curInput = document.getElementById(`cur${type}-${id}`);
        curInput.value = maxInput.value;
        curInput.classList.add('flash-success');
        setTimeout(() => curInput.classList.remove('flash-success'), 250);
    }

    function calc(i) {
        const base = parseFloat(document.getElementById(`baseAgi-${i}`).value) || 0;
        const maxH = parseFloat(document.getElementById(`maxHp-${i}`).value) || 1;
        const curH = parseFloat(document.getElementById(`curHp-${i}`).value) || 0;
        const maxM = parseFloat(document.getElementById(`maxMp-${i}`).value) || 1;
        const curM = parseFloat(document.getElementById(`curMp-${i}`).value) || 0;

        const multiplier = 1 + (Math.max(0, maxH - curH) / maxH) + (Math.max(0, maxM - curM) / maxM);
        const finalAgi = Math.round(base * multiplier * 10) / 10;

        document.getElementById(`val-${i}`).innerText = finalAgi;
    }
</script>

</body>
</html>
