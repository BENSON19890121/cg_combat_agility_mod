<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>戰鬥敏捷修正計算</title>
    <style>
        /* 移除輸入框箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .char-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid #2d3748; }
        
        /* 角色標題與圖示 */
        .char-card h3 { 
            margin: 0 0 20px 0; 
            text-align: center; 
            color: #2c3e50; 
            font-size: 1.5em; 
            letter-spacing: 2px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        .char-icon { font-size: 1.2em; }

        .base-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .label-main { font-size: 1.2em; color: #2d3748; font-weight: bold; }

        .stat-columns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .zone { padding: 10px; border-radius: 12px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .hp-zone { background: #fff5f5; border: 2px solid #feb2b2; }
        .mp-zone { background: #ebf8ff; border: 2px solid #90cdf4; }

        .input-unit { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        input { 
            width: 85px; 
            padding: 10px 2px; 
            border: 2px solid #ddd; 
            border-bottom: none; 
            border-radius: 8px 8px 0 0; 
            font-size: 26px; 
            text-align: center; 
            font-weight: bold;
            background: #fff;
            transition: background-color 0.2s;
        }
        /* 當格子有焦點時，背景微變色提示輸入中 */
        input:focus { background-color: #fffaf0; outline: none; border-color: #f6e05e; }

        .sub-tag { 
            width: 85px; 
            padding: 4px 0; 
            font-size: 11px; 
            font-weight: bold; 
            text-align: center; 
            color: white; 
            border-radius: 0 0 8px 8px; 
            margin-top: -1px; 
            user-select: none;
        }

        .tag-static { background: #a0aec0; border: 2px solid #a0aec0; border-top: none; cursor: default; }

        .tag-btn { 
            cursor: pointer; 
            position: relative; 
            transition: all 0.1s; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.15); 
        }
        .tag-btn:hover { filter: brightness(1.1); }
        .tag-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
        .tag-btn::before { content: '⚡'; position: absolute; left: 4px; font-size: 12px; color: #f6e05e; text-shadow: 0 0 5px rgba(0,0,0,0.3); }

        .hp-zone input { border-color: #fc8181; color: #c53030; }
        .hp-btn { background: #e53e3e; border: 2px solid #e53e3e; border-top: none; }
        
        .mp-zone input { border-color: #63b3ed; color: #2b6cb0; }
        .mp-btn { background: #3182ce; border: 2px solid #3182ce; border-top: none; }

        .flash-success { background-color: #9ae6b4 !important; }

        .agi-input { width: 110px; border: 2px solid #cbd5e0 !important; border-radius: 8px !important; color: #2d3748; }
        .calc-btn { width: 100%; padding: 15px; background: #4a5568; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.2s; }
        .calc-btn:hover { background: #1a202c; }

        .agi-display { margin-top: 15px; padding: 12px; background: #edf2f7; border-radius: 8px; text-align: center; border: 2px solid #cbd5e0; }
        .agi-value { font-size: 1.8em; font-weight: bold; color: #2f855a; display: block; }

        #order-panel { background: #1a202c; color: white; border-radius: 12px; padding: 25px; text-align: center; margin-top: 20px; }
        #order-list { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .order-tag { background: #2d3748; padding: 15px 25px; border-radius: 10px; border-left: 5px solid #f6e05e; font-size: 1.2em; display: flex; align-items: center; gap: 8px; }
        .order-tag b { color: #f6e05e; margin-left: 4px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>戰鬥敏捷修正計算</h2>
    
    <div class="grid">
        <script>
            // 加入 icon 屬性來區分 ABC
            const chars = [
                { id: 0, name: 'A', icon: '⚔️' }, // 角色 A: 劍
                { id: 1, name: 'B', icon: '🛡️' }, // 角色 B: 盾
                { id: 2, name: 'C', icon: '✨' }  // 角色 C: 法杖/魔法
            ];

            chars.forEach(char => {
                // 所有的 input 標籤的 value 都移除，保持全空
                document.write(`
                <div class="char-card">
                    <h3><span class="char-icon">${char.icon}</span> 角色 ${char.name}</h3>
                    
                    <div class="base-section">
                        <span class="label-main">敏捷</span>
                        <input type="number" id="baseAgi-${char.id}" class="agi-input" placeholder="輸入">
                    </div>
                    
                    <div class="stat-columns">
                        <div class="zone hp-zone">
                            <div class="input-unit">
                                <input type="number" id="curHp-${char.id}" placeholder="輸入">
                                <div class="sub-tag tag-static">當前血量</div>
                            </div>
                            <div class="input-unit">
                                <input type="number" id="maxHp-${char.id}" placeholder="輸入">
                                <div class="sub-tag tag-btn hp-btn" onclick="quickFill('Hp', ${char.id})" title="快速全滿">滿血量</div>
                            </div>
                        </div>

                        <div class="zone mp-zone">
                            <div class="input-unit">
                                <input type="number" id="curMp-${char.id}" placeholder="輸入">
                                <div class="sub-tag tag-static">當前魔量</div>
                            </div>
                            <div class="input-unit">
                                <input type="number" id="maxMp-${char.id}" placeholder="輸入">
                                <div class="sub-tag tag-btn mp-btn" onclick="quickFill('Mp', ${char.id})" title="快速全滿">滿魔量</div>
                            </div>
                        </div>
                    </div>

                    <button class="calc-btn" onclick="calc(${char.id})">計算角色 ${char.name}</button>
                    <div class="agi-display">戰鬥敏捷：<span class="agi-value" id="val-${char.id}">--</span></div>
                </div>
                `);
            });
        </script>
    </div>

    <div id="order-panel">
        <div style="color: #a0aec0; font-weight: bold; margin-bottom: 5px;">ATTACK ORDER / 出手順序</div>
        <div id="order-list">尚未計算</div>
    </div>
</div>

<script>
    // results 初始化也清空數值
    let results = [
        { name: 'A', icon: '⚔️', agi: 0, active: false },
        { name: 'B', icon: '🛡️', agi: 0, active: false },
        { name: 'C', icon: '✨', agi: 0, active: false }
    ];

    function quickFill(type, id) {
        // 如果滿值格子是空的，不執行動作
        const maxInput = document.getElementById(`max${type}-${id}`);
        if (maxInput.value === '') return;

        const maxVal = maxInput.value;
        const curInput = document.getElementById(`cur${type}-${id}`);
        
        curInput.value = maxVal;
        
        // 視覺回饋
        curInput.classList.add('flash-success');
        setTimeout(() => curInput.classList.remove('flash-success'), 200);
    }

    function calc(i) {
        // 加入防呆邏輯：|| 0 代表如果是 NaN (空值)，就設為 0
        const base = parseFloat(document.getElementById(`baseAgi-${i}`).value) || 0;
        
        // 滿值格子的防呆：|| 1，防止除以 0
        const maxH = parseFloat(document.getElementById(`maxHp-${i}`).value) || 1;
        const curH = parseFloat(document.getElementById(`curHp-${i}`).value) || 0;
        const maxM = parseFloat(document.getElementById(`maxMp-${i}`).value) || 1;
        const curM = parseFloat(document.getElementById(`curMp-${i}`).value) || 0;

        // 當前血量大於滿血量的防呆（雖然遊戲邏輯很少見，但這裡做個保險）
        const realCurH = Math.min(maxH, curH);
        const realCurM = Math.min(maxM, curM);

        const lostH = Math.max(0, maxH - realCurH);
        const lostM = Math.max(0, maxM - realCurM);

        // 計算公式：敏捷 * (1 + 損血比例 + 損魔比例)
        const multiplier = 1 + (lostH / maxH) + (lostM / maxM);
        const finalAgi = Math.round(base * multiplier * 10) / 10;

        results[i].agi = finalAgi;
        results[i].active = true;
        document.getElementById(`val-${i}`).innerText = finalAgi;
        updateOrder();
    }

    function updateOrder() {
        const orderList = document.getElementById('order-list');
        // 只篩選出有被計算過的角色，並依敏捷排序
        const activeChars = results.filter(r => r.active).sort((a, b) => b.agi - a.agi);
        
        if (activeChars.length === 0) return;
        
        orderList.innerHTML = '';
        activeChars.forEach((char, index) => {
            const div = document.createElement('div');
            div.className = 'order-tag';
            // 出手順序也加入圖示
            div.innerHTML = `Rank ${index + 1} : ${char.icon} 角色 ${char.name} <b>${char.agi}</b>`;
            orderList.appendChild(div);
        });
    }
</script>

</body>
</html>
